name: CloudStorage
version: 1.0.0
main: com.nullswan.cloudstorage.CloudStoragePlugin
description: Infinite virtual item storage — /cloud or Cloud Block
author: nullswan
api-version: '1.21'
commands:
  cloud:
    description: Open your cloud storage
    usage: /cloud
    permission: cloudstorage.use
permissions:
  cloudstorage.use:
    description: Access cloud storage
    default: true
  cloudstorage.craft:
    description: Craft cloud blocks
    default: true
